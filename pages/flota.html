<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRANSZELA - Nuestra Flota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="icon" type="image/png" href="../assets/icons/favicon.ico">
</head>

<body>
    <!-- Mounted Header & Pill -->
    <div id="app-header"></div>

    <!-- Page Specific Content -->
    <main>
        <section class="l-section page-header page-header--flota">
            <div class="l-container">
                <h1 class="page-header__title">Nuestra Flota</h1>
                <p class="page-header__desc">Conoce los buses más modernos y cómodos del Perú para tu viaje.</p>
            </div>
        </section>

        <!-- Inventario Flota Virtual -->
        <section class="l-section" style="background-color: var(--color-bg);">
            <div class="l-container">
                <div id="fleet-container" class="l-grid l-grid--3">
                    <!-- Fleet rendered via JS -->
                </div>
            </div>
        </section>

        <!-- Lightbox Modal -->
        <div id="fleet-lightbox" class="lightbox">
            <button class="lightbox__close" aria-label="Cerrar">&times;</button>
            <div class="lightbox__content">
                <img src="" alt="Bus Ampliado" class="lightbox__img">
                <div class="lightbox__caption"></div>
            </div>
        </div>
    </main>

    <!-- Footer Component -->
    <div id="app-footer"></div>

    <script type="module" src="../scripts/main.js"></script>
</body>

</html>
